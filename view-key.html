<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZED System - Nhận Key</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; font-family: 'Inter', sans-serif; color: white; }
        .key-card { background: linear-gradient(145deg, #0f172a, #1e293b); border: 1px solid rgba(59, 130, 246, 0.3); }
        .shimmer-text { background: linear-gradient(90deg, #60a5fa, #ffffff, #60a5fa); background-size: 200% auto; animation: shine 3s linear infinite; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        @keyframes shine { to { background-position: 200% center; } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-slate-900/80 border border-slate-800 rounded-[2.5rem] p-8 shadow-2xl backdrop-blur-md">
        
        <div id="status-box" class="text-center py-6">
            <div class="inline-block animate-spin w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full mb-4"></div>
            <p id="status-text" class="text-slate-400">Đang xác thực dữ liệu từ Link4M...</p>
        </div>

        <div id="key-content" class="hidden animate-in fade-in zoom-in duration-500">
            <h2 class="text-center text-emerald-400 font-bold text-sm mb-6 flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" /></svg>
                XÁC THỰC THÀNH CÔNG
            </h2>

            <div class="key-card rounded-3xl p-8 mb-6 text-center shadow-inner">
                <p class="text-[10px] text-slate-500 uppercase tracking-widest mb-4">Mã truy cập cá nhân</p>
                <div id="final-key" class="text-3xl font-black tracking-tighter shimmer-text">GENERATING...</div>
            </div>

            <div class="bg-blue-500/5 border border-blue-500/10 rounded-2xl p-4 mb-8 text-center">
                <p id="note-text" class="text-[11px] text-slate-500 italic"></p>
            </div>

            <button onclick="copyKey()" id="copy-btn" class="w-full bg-white text-slate-950 py-4 rounded-2xl font-black hover:bg-blue-50 transition-all flex items-center justify-center gap-2 shadow-lg shadow-white/5">
                SAO CHÉP NGAY
            </button>
        </div>

        <div id="error-btn" class="hidden mt-4 text-center">
            <a href="index.html" class="text-blue-500 text-sm underline">Quay lại trang chủ để thử lại</a>
        </div>
    </div>

    <script>
        function generateID(len) {
            const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; // Loại bỏ O, 0, I, 1 để tránh nhầm lẫn
            let res = "";
            for(let i=0; i<len; i++) res += chars.charAt(Math.floor(Math.random() * chars.length));
            return res;
        }

        window.onload = async function() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            // NẾU KHÔNG CÓ TOKEN TRÊN URL
            if (!token) {
                document.getElementById('status-text').innerText = "LỖI: Không tìm thấy Token xác thực!";
                document.getElementById('status-text').classList.add('text-red-500');
                document.getElementById('error-btn').classList.remove('hidden');
                // Không tự động chuyển trang để người dùng đọc được lỗi
                return;
            }

            try {
                // Đọc file data.json
                const response = await fetch('data.json');
                if (!response.ok) throw new Error("Không thể tải data.json");
                const data = await response.json();
                
                // Hiệu ứng chờ 1.5 giây cho chuyên nghiệp
                setTimeout(() => {
                    const myKey = data.config.key_prefix + generateID(4) + "-" + generateID(4) + data.config.key_suffix;
                    
                    document.getElementById('status-box').classList.add('hidden');
                    document.getElementById('key-content').classList.remove('hidden');
                    document.getElementById('final-key').innerText = myKey;
                    document.getElementById('note-text').innerText = data.config.note;
                }, 1500);

            } catch (err) {
                document.getElementById('status-text').innerText = "Lỗi hệ thống: " + err.message;
                document.getElementById('error-btn').classList.remove('hidden');
            }
        };

        function copyKey() {
            const key = document.getElementById('final-key').innerText;
            navigator.clipboard.writeText(key);
            const btn = document.getElementById('copy-btn');
            const originalText = btn.innerHTML;
            btn.innerText = "ĐÃ SAO CHÉP!";
            btn.style.backgroundColor = "#10b981";
            btn.style.color = "white";
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.style.backgroundColor = "white";
                btn.style.color = "#020617";
            }, 2000);
        }
    </script>
</body>
</html>
