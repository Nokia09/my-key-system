<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZED System - Your Key</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: white; }
        .key-box { background: linear-gradient(145deg, #1e293b, #0f172a); border: 1px solid rgba(59, 130, 246, 0.2); }
        .shimmer { background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent); background-size: 200% 100%; animation: shimmer 2s infinite; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-slate-900 border border-slate-800 rounded-[2.5rem] p-8 shadow-2xl">
        
        <div id="loader" class="text-center py-10">
            <div class="inline-block animate-spin w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full mb-4"></div>
            <p class="text-slate-400 animate-pulse">Đang xác thực Token từ Link4M...</p>
        </div>

        <div id="result-content" class="hidden animate-in fade-in duration-700">
            <h2 class="text-center text-emerald-400 font-bold text-lg mb-6 flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                </svg>
                XÁC THỰC THÀNH CÔNG
            </h2>

            <div class="key-box rounded-2xl p-6 mb-6 shimmer text-center relative overflow-hidden">
                <p class="text-[10px] text-slate-500 uppercase tracking-widest mb-3">Mã truy cập duy nhất</p>
                <div id="final-key" class="text-3xl font-mono font-black text-white selection:bg-blue-500">----</div>
            </div>

            <div class="bg-blue-500/5 border border-blue-500/10 rounded-xl p-4 mb-8">
                <p id="system-note" class="text-xs text-slate-400 leading-relaxed"></p>
            </div>

            <button onclick="copyKey()" id="copy-btn" class="w-full bg-white text-slate-950 py-4 rounded-2xl font-bold hover:bg-slate-200 transition-all flex items-center justify-center gap-2">
                SAO CHÉP MÃ KEY
            </button>
        </div>
    </div>

    <script>
        function generateRandomStr(len) {
            return Array.from({length: len}, () => "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789".charAt(Math.floor(Math.random() * 36))).join('');
        }

        window.onload = async function() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            if (!token) {
                window.location.href = "index.html";
                return;
            }

            try {
                // Fetch data from JSON
                const res = await fetch('data.json');
                const siteData = await res.json();
                
                // Hiệu ứng chờ 2 giây cho chuyên nghiệp
                setTimeout(() => {
                    const k = siteData.config.key_prefix + generateRandomStr(4) + "-" + generateRandomStr(4) + siteData.config.key_suffix;
                    
                    document.getElementById('loader').classList.add('hidden');
                    document.getElementById('result-content').classList.remove('hidden');
                    document.getElementById('final-key').innerText = k;
                    document.getElementById('system-note').innerText = siteData.config.note;
                }, 2000);

            } catch (err) {
                document.getElementById('loader').innerText = "Lỗi kết nối dữ liệu JSON!";
            }
        };

        function copyKey() {
            const key = document.getElementById('final-key').innerText;
            navigator.clipboard.writeText(key);
            const btn = document.getElementById('copy-btn');
            btn.innerText = "ĐÃ SAO CHÉP!";
            btn.classList.replace('bg-white', 'bg-emerald-500');
            btn.classList.add('text-white');
            setTimeout(() => {
                btn.innerText = "SAO CHÉP MÃ KEY";
                btn.classList.replace('bg-emerald-500', 'bg-white');
                btn.classList.remove('text-white');
            }, 2000);
        }
    </script>
</body>
</html>
