<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZED System - Nhận Key</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; font-family: 'Inter', sans-serif; color: white; }
        .key-card { background: linear-gradient(145deg, #0f172a, #1e293b); border: 1px solid rgba(59, 130, 246, 0.3); }
        .shimmer-text { background: linear-gradient(90deg, #60a5fa, #ffffff, #60a5fa); background-size: 200% auto; animation: shine 3s linear infinite; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        @keyframes shine { to { background-position: 200% center; } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-slate-900/80 border border-slate-800 rounded-[2.5rem] p-8 shadow-2xl backdrop-blur-md">
        
        <div id="status-box" class="text-center py-6">
            <div id="loader-icon" class="inline-block animate-spin w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full mb-4"></div>
            <p id="status-text" class="text-slate-400">Đang kiểm tra mã Token từ Link4M...</p>
        </div>

        <div id="key-content" class="hidden animate-in fade-in zoom-in duration-500">
            <h2 class="text-center text-emerald-400 font-bold text-sm mb-6 flex items-center justify-center gap-2 uppercase tracking-tighter">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" /></svg>
                Xác thực thành công
            </h2>

            <div class="key-card rounded-3xl p-8 mb-6 text-center">
                <p class="text-[10px] text-slate-500 uppercase tracking-[0.2em] mb-4 font-semibold">Your Personal Access Key</p>
                <div id="final-key" class="text-3xl font-black tracking-tighter shimmer-text">----</div>
            </div>

            <div class="bg-blue-500/5 border border-blue-500/10 rounded-2xl p-4 mb-8 text-center">
                <p id="note-text" class="text-[11px] text-slate-500 leading-relaxed italic"></p>
            </div>

            <button onclick="copyKey()" id="copy-btn" class="w-full bg-white text-slate-950 py-4 rounded-2xl font-black hover:bg-blue-50 transition-all flex items-center justify-center gap-2 shadow-lg active:scale-95">
                SAO CHÉP MÃ KEY
            </button>
        </div>

        <div id="error-action" class="hidden mt-4 text-center">
            <a href="index.html" class="inline-block bg-slate-800 px-6 py-2 rounded-full text-xs text-blue-400 hover:text-white transition">Quay lại Trang Chủ</a>
        </div>
    </div>

    <script>
        function generateRandom(len) {
            const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
            let res = "";
            for(let i=0; i<len; i++) res += chars.charAt(Math.floor(Math.random() * chars.length));
            return res;
        }

        window.onload = async function() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            // NẾU KHÔNG CÓ TOKEN TRÊN URL (LỖI CỦA BẠN TRONG VIDEO)
            if (!token) {
                document.getElementById('loader-icon').classList.add('hidden');
                document.getElementById('status-text').innerHTML = `
                    <span class="text-red-500 font-black">KHÔNG TÌM THẤY TOKEN!</span><br>
                    <p class="text-xs text-slate-500 mt-3 px-2">Vui lòng không truy cập trực tiếp trang này. Bạn phải vượt link từ Trang Chủ mới có Key.</p>
                `;
                document.getElementById('error-action').classList.remove('hidden');
                return;
            }

            try {
                // Tải file cấu hình
                const res = await fetch('data.json');
                if (!res.ok) throw new Error();
                const siteData = await res.json();
                
                // Hiệu ứng giả lập xác thực trong 1.5s
                setTimeout(() => {
                    const myKey = siteData.config.key_prefix + generateRandom(4) + "-" + generateRandom(4) + siteData.config.key_suffix;
                    
                    document.getElementById('status-box').classList.add('hidden');
                    document.getElementById('key-content').classList.remove('hidden');
                    document.getElementById('final-key').innerText = myKey;
                    document.getElementById('note-text').innerText = siteData.config.note;
                }, 1500);

            } catch (err) {
                document.getElementById('status-text').innerText = "Lỗi: File data.json bị thiếu!";
            }
        };

        function copyKey() {
            const k = document.getElementById('final-key').innerText;
            navigator.clipboard.writeText(k);
            const b = document.getElementById('copy-btn');
            const oldTxt = b.innerText;
            b.innerText = "ĐÃ SAO CHÉP!";
            b.style.background = "#10b981";
            b.style.color = "#ffffff";
            setTimeout(() => {
                b.innerText = oldTxt;
                b.style.background = "#ffffff";
                b.style.color = "#020617";
            }, 2000);
        }
    </script>
</body>
</html>
