<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZED System - Trang Chủ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .animate-glow { animation: glow 2s infinite alternate; }
        @keyframes glow { from { box-shadow: 0 0 10px #3b82f6; } to { box-shadow: 0 0 25px #3b82f6; } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 overflow-hidden">
    <div class="absolute top-0 left-0 w-full h-full -z-10">
        <div class="absolute top-1/4 left-1/4 w-64 h-64 bg-blue-600/20 blur-[120px] rounded-full"></div>
        <div class="absolute bottom-1/4 right-1/4 w-64 h-64 bg-purple-600/20 blur-[120px] rounded-full"></div>
    </div>

    <div class="glass max-w-sm w-full rounded-[2rem] p-10 text-center shadow-2xl transition-transform hover:scale-[1.02]">
        <div class="mb-6 inline-flex p-5 rounded-3xl bg-blue-500/10 text-blue-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
        </div>

        <h1 class="text-3xl font-black text-white mb-2 tracking-tight uppercase italic">ZED SYSTEM</h1>
        <p class="text-slate-400 text-sm mb-10 leading-relaxed">Nhấn nút bên dưới để bắt đầu vượt link và nhận Key truy cập miễn phí.</p>

        <button onclick="startRedirect()" class="animate-glow w-full bg-blue-600 py-4 rounded-2xl font-black text-white hover:bg-blue-500 transition-all active:scale-95">
            LẤY KEY NGAY
        </button>
        
        <p class="mt-6 text-[10px] text-slate-500 uppercase tracking-widest">Powered by ZED Cloud</p>
    </div>

    <script>
        function startRedirect() {
            // LẤY LINK TRANG HIỂN THỊ KEY (view-key.html)
            const targetPage = window.location.origin + window.location.pathname.replace('index.html', 'view-key.html');
            const apiLink4M = "https://link4m.co/st?api=67de0860d2f8a229cb25f955&url=";
            
            // Chuyển hướng
            window.location.href = apiLink4M + encodeURIComponent(targetPage);
        }
    </script>
</body>
</html>
